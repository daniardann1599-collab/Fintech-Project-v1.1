name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend tests

      - name: Unit tests (pytest)
        env:
          PYTHONPATH: backend
        run: pytest

  optional-docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose build (optional)
        run: docker compose -f infra/docker-compose.yml build backend
