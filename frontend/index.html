<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banking Demo UI</title>
    <style>
      body { font-family: "Trebuchet MS", sans-serif; margin: 2rem; background: #f6f9ff; color: #1b2840; }
      h1 { margin-bottom: 0.5rem; }
      .card { background: #fff; border: 1px solid #dce4f2; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      button { padding: 0.5rem 1rem; border: 0; border-radius: 6px; background: #0077b6; color: #fff; cursor: pointer; }
      input { padding: 0.4rem; margin-right: 0.4rem; }
      pre { background: #0d1321; color: #d1e8ff; padding: 1rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Web Banking Demo</h1>
    <p>Primary API interaction is via Swagger UI at <a href="http://localhost:8000/docs" target="_blank">/docs</a>.</p>

    <div class="card">
      <h2>Health Check</h2>
      <button id="check-health">Check Backend Health</button>
      <pre id="output">Click a button to run a request.</pre>
    </div>

    <div class="card">
      <h2>Quick Register</h2>
      <input id="email" type="email" placeholder="user@example.com" />
      <input id="password" type="password" placeholder="password (8+)" />
      <button id="register">Register</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
