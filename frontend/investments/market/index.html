<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Market | Northstar Bank</title>
    <link rel="stylesheet" href="../../assets/css/main.css?v=20260311" />
  </head>
  <body class="app-body">
    <div class="layout">
      <aside class="sidebar">
        <a class="brand" href="../../index.html">
          <span class="brand-mark">NB</span>
          <span class="title">Northstar</span>
        </a>
        <nav class="nav-menu">
          <a class="nav-link" href="../../customer.html"><span class="label">Customer dashboard</span></a>
          <a class="nav-link active" href="./"><span class="label">Live market</span></a>
          <a class="nav-link" href="../order/"><span class="label">Investment order</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="welcome-title">Live market data</p>
            <p id="market-sub" class="welcome-sub">Loading latest snapshots...</p>
          </div>
          <button id="logout-btn" class="button button-danger" type="button">Logout</button>
        </header>

        <div id="market-alert" class="alert"></div>

        <section class="panel">
          <div class="market-controls">
            <div class="field">
              <label for="market-search">Search symbol</label>
              <input id="market-search" name="market-search" placeholder="Search: AAPL" />
            </div>
            <div class="field">
              <label for="market-sort">Sort by price</label>
              <button id="market-sort" class="button button-ghost" type="button">Price: High to Low</button>
            </div>
          </div>
        </section>

        <section id="section-sp500" class="panel">
          <div class="market-meta">
            <h2>S&amp;P 500</h2>
            <span id="sp500-status" class="inline-muted">Loading...</span>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Stock Symbol</th>
                  <th>Company Name</th>
                  <th>Current Price</th>
                  <th>Price Change %</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="sp500-table-body"></tbody>
            </table>
          </div>
        </section>

        
      </main>
    </div>

    <script type="module" src="../../assets/js/pages/market.js?v=20260311"></script>
  </body>
</html>
