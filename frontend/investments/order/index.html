<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Order | Northstar Bank</title>
    <link rel="stylesheet" href="../../assets/css/main.css?v=20260311" />
  </head>
  <body class="app-body">
    <div class="layout">
      <aside class="sidebar">
        <a class="brand" href="../../index.html">
          <span class="brand-mark">NB</span>
          <span class="title">Northstar</span>
        </a>
        <nav class="nav-menu">
          <a class="nav-link" href="../../customer.html"><span class="label">Customer dashboard</span></a>
          <a class="nav-link" href="../market/"><span class="label">Live market</span></a>
          <a class="nav-link active" href="./"><span class="label">Investment order</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="welcome-title">Place investment order</p>
            <p id="order-sub" class="welcome-sub">Select an account and submit your trade.</p>
          </div>
          <button id="logout-btn" class="button button-danger" type="button">Logout</button>
        </header>

        <div id="order-alert" class="alert"></div>

        <section class="panel">
          <h2>Order ticket</h2>
          <form id="order-form" class="form-row-2">
            <div class="field">
              <label for="order-symbol">Symbol</label>
              <input id="order-symbol" name="symbol" readonly />
            </div>
            <div class="field">
              <label for="order-market">Market</label>
              <input id="order-market" name="market" readonly />
            </div>
            <div class="field">
              <label for="order-side">Side</label>
              <select id="order-side" name="side" required>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
              </select>
            </div>
            <div class="field">
              <label for="order-account">Account</label>
              <select id="order-account" name="account_id" required></select>
            </div>
            <div class="field">
              <label for="order-quantity">Quantity</label>
              <input id="order-quantity" name="quantity" type="number" min="0.0001" step="0.0001" placeholder="10" required />
            </div>
            <div class="field">
              <label for="order-name">Company name (optional)</label>
              <input id="order-name" name="name" placeholder="Apple Inc." />
            </div>
            <button class="button button-primary" type="submit">Submit order</button>
          </form>
          <p class="inline-muted" id="order-hint"></p>
        </section>
      </main>
    </div>

    <script type="module" src="../../assets/js/pages/market_order.js?v=20260311"></script>
  </body>
</html>
