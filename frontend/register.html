<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Northstar Bank</title>
    <link rel="stylesheet" href="assets/css/main.css?v=20260311" />
  </head>
  <body class="app-body">
    <main class="auth-wrapper">
      <section class="auth-card fade-up">
        <a class="brand" href="index.html">
          <span class="brand-mark">NB</span>
          <span class="title">Northstar Bank</span>
        </a>
        <h1>Open your banking profile</h1>
        <p class="auth-sub">Create your user account and complete simplified KYC.</p>

        <div id="register-alert" class="alert"></div>

        <form id="register-form" class="form-grid">
          <div class="form-row-2">
            <div class="field">
              <label for="full_name">Full name</label>
              <input id="full_name" name="full_name" minlength="2" placeholder="Enter your full name" required />
            </div>
            <div class="field">
              <label for="document_id">KYC document ID</label>
              <input id="document_id" name="document_id" minlength="3" placeholder="ID-12345" required />
            </div>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="example@email.com" required />
          </div>
          <div class="form-row-2">
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" minlength="8" placeholder="Create a secure password" required />
            </div>
            <div class="field">
              <label for="confirm_password">Confirm password</label>
              <input id="confirm_password" name="confirm_password" type="password" minlength="8" placeholder="Repeat your password" required />
            </div>
          </div>

          <button type="submit" class="button button-primary">Create account</button>
        </form>

        <p class="auth-footer">Already registered? <a href="login.html"><strong>Login</strong></a></p>
      </section>
    </main>

    <script type="module" src="assets/js/pages/register.js?v=20260311"></script>
  </body>
</html>
